name: Deploy Vue to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # 升级到22，满足Vite版本要求
          cache: 'npm'

      - name: 配置淘宝镜像并安装依赖
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install

      - name: 执行Vue项目打包
        run: npm run build

      - name: 部署打包产物到gh-pages分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist